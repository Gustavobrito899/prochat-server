<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProChat - Clean Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-wallpaper: #F3F4F6; 
            --superficie: #FFFFFF;
            --superficie-solid: #FFFFFF;
            --cor-primaria: #2563EB; 
            --gradiente-primario: #2563EB; 
            --cor-texto-botao: #FFFFFF;
            --texto-principal: #111827;
            --texto-secundario: #6B7280; 
            --msg-recebida: #F3F4F6;
            --msg-enviada: #2563EB; 
            --borda: #E5E7EB; 
            --hover: #F9FAFB;
            --sombra-leve: 0 1px 3px rgba(0,0,0,0.05);
            --sombra-densa: 0 10px 25px rgba(0,0,0,0.05);
            --status-online: #10B981; 
            --tamanho-fonte-chat: 15px; 
        }

        [data-theme="dark"] {
            --bg-wallpaper: #111827;
            --superficie: #1F2937;
            --superficie-solid: #1F2937;
            --cor-primaria: #3B82F6;
            --texto-principal: #F9FAFB;
            --texto-secundario: #9CA3AF;
            --msg-recebida: #374151;
            --msg-enviada: #3B82F6;
            --borda: #374151;
            --hover: #283548;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
        body { background: var(--bg-wallpaper); color: var(--texto-principal); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .btn-primary { width: 100%; padding: 12px; background: var(--cor-primaria); color: var(--cor-texto-botao); border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
        .icon-btn { cursor: pointer; color: var(--texto-secundario); background: transparent; border: none; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; font-size: 20px; transition: all 0.2s; position: relative; z-index: 15;}
        
        #loading-screen { position: fixed; inset: 0; background: var(--superficie); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: var(--cor-primaria); }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--borda); border-top: 3px solid var(--cor-primaria); border-radius: 50%; animation: spin 0.8s infinite linear; margin-bottom: 16px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #auth-container { width: 100%; max-width: 380px; background: var(--superficie); padding: 40px 32px; border-radius: 12px; box-shadow: var(--sombra-densa); border: 1px solid var(--borda); text-align: center; margin: 20px; }
        .input-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--borda); border-radius: 8px; background: var(--bg-wallpaper); color: var(--texto-principal); outline: none; margin-bottom: 24px;}
        
        #main-app { display: flex; width: 100%; max-width: 1200px; height: 90vh; background: var(--superficie); border-radius: 12px; box-shadow: var(--sombra-densa); border: 1px solid var(--borda); overflow: hidden; }
        
        .sidebar { width: 340px; border-right: 1px solid var(--borda); display: flex; flex-direction: column; background: var(--superficie); z-index: 10; }
        .sidebar-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid transparent;}
        .avatar { width: 36px; height: 36px; background: var(--cor-primaria); color: var(--cor-texto-botao); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 500; flex-shrink: 0; font-size: 14px; object-fit: cover; background-size: cover; background-position: center; }
        
        .contact-list { flex-grow: 1; overflow-y: auto; }
        .contact-item { padding: 12px 20px; display: flex; gap: 14px; cursor: pointer; align-items: center; position: relative; border-bottom: 1px solid var(--bg-wallpaper); transition: background 0.2s;}
        .contact-item:hover, .contact-item.active { background: var(--hover); }
        .contact-name { font-weight: 500; font-size: 15px; color: var(--texto-principal);}
        .contact-msg { font-size: 13px; color: var(--texto-secundario); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }

        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-wallpaper); position: relative; }
        .chat-header { padding: 14px 24px; background: var(--superficie); border-bottom: 1px solid var(--borda); display: flex; align-items: center; z-index: 10;}
        .chat-messages { flex-grow: 1; padding: 24px 8%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;}
        .encryption-notice { align-self: center; background: transparent; padding: 6px 12px; font-size: 12px; color: var(--texto-secundario); margin-bottom: 16px; font-weight: 400;}
        
        .message { max-width: 65%; padding: 10px 14px; font-size: var(--tamanho-fonte-chat); line-height: 1.5; border-radius: 12px; box-shadow: var(--sombra-leve); word-wrap: break-word;}
        .message.received { background: var(--superficie); align-self: flex-start; color: var(--texto-principal); border: 1px solid var(--borda); border-bottom-left-radius: 4px; }
        .message.sent { background: var(--msg-enviada); color: var(--cor-texto-botao); align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid transparent;}
        .message-footer { display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-top: 4px; font-size: 11px; opacity: 0.8;}

        .chat-input-area { padding: 16px 24px; display: flex; align-items: center; gap: 12px; background: var(--superficie); border-top: 1px solid var(--borda);}
        .input-wrapper { flex-grow: 1; display: flex; align-items: center; background: var(--bg-wallpaper); border-radius: 8px; padding: 8px 16px; border: 1px solid var(--borda);}
        .input-wrapper input { width: 100%; padding: 4px 0; border: none; outline: none; background: transparent; color: var(--texto-principal); font-size: 15px; }
        .send-btn { background: var(--cor-primaria); color: var(--cor-texto-botao); border: none; border-radius: 8px; width: 40px; height: 40px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; }

        /* AJUSTES PARA CELULAR */
        .back-btn-mobile { display: none; background: transparent; border: none; color: var(--texto-secundario); font-size: 24px; padding-right: 12px; cursor: pointer; }
        
        @media (max-width: 768px) {
            #main-app { border-radius: 0; height: 100vh; border: none; }
            .sidebar { width: 100%; border-right: none; }
            .chat-area { display: none; width: 100%; }
            #main-app.show-chat .sidebar { display: none !important; }
            #main-app.show-chat .chat-area { display: flex !important; }
            .back-btn-mobile { display: block; }
            .message { max-width: 85%; }
            .chat-messages { padding: 20px 4%; }
            .chat-input-area { padding: 12px; }
        }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div><h2 style="font-weight: 500;">ProChat</h2></div>

    <div id="auth-container" class="hidden">
        <div class="auth-logo">Entrar no ProChat</div>
        <p style="color: var(--texto-secundario); margin-bottom: 24px; font-size: 14px;">Confirme seu nome para continuar.</p>
        <div class="input-group">
            <input type="text" id="user-contact" placeholder="Seu nome">
        </div>
        <button class="btn-primary" onclick="AuthFlow.verifyOTP()">Entrar</button>
    </div>

    <div id="main-app" class="hidden">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div style="display: flex; align-items: center; gap: 12px; font-weight: 500;">
                    <div class="avatar" id="sidebar-avatar-letter">G</div>
                    <span id="sidebar-user-name">Gustavo</span>
                </div>
            </header>
            
            <div style="font-size: 20px; font-weight: 600; padding: 16px 20px;">Conversas</div>
            
            <div class="contact-list" id="contact-list-container"></div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <div style="display: flex; align-items: center;">
                    <button class="back-btn-mobile" onclick="MobileFlow.closeChat()">←</button>
                    <div class="avatar" id="current-chat-avatar" style="background-image: url('https://cdn-icons-png.flaticon.com/512/2352/2352167.png'); width: 40px; height: 40px; margin-right: 12px; font-size: 18px; color: transparent;">G</div>
                    <div>
                        <h3 style="font-size: 16px; font-weight: 600;" id="current-chat-name">Grupo Geral</h3>
                        <div id="current-chat-status" style="font-size: 13px; color: var(--status-online);">Conectado</div>
                    </div>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages-container"></div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Escreva uma mensagem...">
                </div>
                <button class="send-btn" id="send-btn">➤</button>
            </div>
        </main>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://prochat-server-6bra.onrender.com');
        let userName = "";
        let currentContact = "Geral";

        socket.on('connect', () => {
            if (userName !== "") socket.emit('registrar_usuario', userName);
        });

        function renderizarMensagemSingle(dados) {
            const container = document.getElementById('chat-messages-container');
            const isMe = dados.nome === userName;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMe ? 'sent' : 'received'} fade-in`;
            msgDiv.innerHTML = `
                <div style="font-size: 11px; font-weight: 600; margin-bottom: 4px; opacity: 0.8;">${dados.nome}</div>
                ${dados.texto}
                <div class="message-footer"><span class="message-time">${dados.hora || ''}</span></div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        socket.on('historico_mensagens', (historico) => {
            const container = document.getElementById('chat-messages-container');
            container.innerHTML = '<div class="encryption-notice">Bem-vindo ao Grupo Geral!</div>';
            if(historico && historico.length > 0) historico.forEach(renderizarMensagemSingle);
        });

        socket.on('receber_mensagem', (dados) => {
            if(currentContact === 'Geral') renderizarMensagemSingle(dados);
            const preview = document.getElementById('preview-Geral');
            if(preview) preview.innerText = `${dados.nome}: ${dados.texto}`;
        });

        socket.on('historico_privado_resposta', (dados) => {
            if (currentContact === dados.contato) {
                const container = document.getElementById('chat-messages-container');
                container.innerHTML = `<div class="encryption-notice">Chat com ${dados.contato}. As mensagens são seguras.</div>`;
                if(dados.historico && dados.historico.length > 0) {
                    dados.historico.forEach(renderizarMensagemSingle);
                }
            }
        });

        socket.on('receber_mensagem_privada', (dados) => {
            if (currentContact === dados.contatoOriginal) renderizarMensagemSingle(dados);
            const preview = document.getElementById(`preview-${dados.contatoOriginal}`);
            if(preview) preview.innerText = `${dados.texto}`;
        });

        socket.on('lista_usuarios', (usuarios) => {
            const container = document.getElementById('contact-list-container');
            let html = `
                <div class="contact-item ${currentContact === 'Geral' ? 'active' : ''}" onclick="ChatFlow.switchContact('Geral')">
                    <div class="avatar" style="background-image: url('https://cdn-icons-png.flaticon.com/512/2352/2352167.png'); color: transparent;">G</div>
                    <div style="flex-grow: 1; overflow: hidden; padding-left: 14px;">
                        <div class="contact-name">Grupo Geral</div>
                        <div class="contact-msg" id="preview-Geral">Chat público</div>
                    </div>
                </div>`;

            usuarios.forEach(user => {
                if(user !== userName) { 
                    const primeiraLetra = user.charAt(0).toUpperCase();
                    html += `
                        <div class="contact-item ${currentContact === user ? 'active' : ''}" onclick="ChatFlow.switchContact('${user}')">
                            <div class="avatar" style="background: var(--cor-primaria); color: white;">${primeiraLetra}</div>
                            <div style="flex-grow: 1; overflow: hidden; padding-left: 14px;">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div class="contact-name">${user}</div>
                                    <span style="font-size: 11px; color: var(--status-online); font-weight: 500;">Online</span>
                                </div>
                                <div class="contact-msg" id="preview-${user}">Toque para conversar</div>
                            </div>
                        </div>`;
                }
            });
            container.innerHTML = html;
        });

        const AuthFlow = {
            verifyOTP: () => {
                const nameInput = document.getElementById('user-contact').value.trim();
                if(nameInput.length < 2) return alert('Insira um nome válido.');
                userName = nameInput;
                document.getElementById('sidebar-user-name').innerText = userName;
                document.getElementById('sidebar-avatar-letter').innerText = userName.charAt(0).toUpperCase();
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                socket.emit('registrar_usuario', userName);
                socket.emit('pedir_historico_geral');
            }
        };

        const ChatFlow = {
            sendText: () => {
                const input = document.getElementById('message-input');
                const text = input.value.trim();
                if(!text) return;

                const dados = { nome: userName, texto: text, hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };

                if(currentContact === 'Geral') {
                    socket.emit('enviar_mensagem', dados);
                } else {
                    dados.de = userName; dados.para = currentContact;
                    socket.emit('enviar_mensagem_privada', dados);
                }
                input.value = '';
            },
            switchContact: (name) => {
                currentContact = name;
                document.getElementById('current-chat-name').innerText = name;
                document.getElementById('chat-messages-container').innerHTML = '<div class="encryption-notice">Carregando...</div>';
                
                const avatarEle = document.getElementById('current-chat-avatar');
                if(name === 'Geral') {
                    document.getElementById('current-chat-status').innerText = 'Conectado';
                    avatarEle.style.backgroundImage = "url('https://cdn-icons-png.flaticon.com/512/2352/2352167.png')";
                    avatarEle.style.color = "transparent";
                    socket.emit('pedir_historico_geral');
                } else {
                    document.getElementById('current-chat-status').innerText = 'Online';
                    avatarEle.style.backgroundImage = "none";
                    avatarEle.innerText = name.charAt(0).toUpperCase();
                    avatarEle.style.color = "#fff";
                    socket.emit('pedir_historico_privado', { meuNome: userName, contato: name });
                }

                document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
                if(window.innerWidth <= 768) document.getElementById('main-app').classList.add('show-chat');
            }
        };

        const MobileFlow = { closeChat: () => document.getElementById('main-app').classList.remove('show-chat') };

        document.getElementById('send-btn').addEventListener('click', ChatFlow.sendText);
        document.getElementById('message-input').addEventListener('keypress', e => { if (e.key === 'Enter') ChatFlow.sendText(); });

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('auth-container').classList.remove('hidden');
            }, 600);
        };
    </script>
</body>
</html>
